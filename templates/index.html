<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d0f18">
  <title>Kiora</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sb-logo">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="12" cy="6"  r="3" fill="white"/>
      <circle cx="5"  cy="19" r="2" fill="white"/>
      <circle cx="19" cy="19" r="2" fill="white"/>
      <line x1="12" y1="6" x2="5"  y2="19" stroke="white" stroke-width="1.4"/>
      <line x1="12" y1="6" x2="19" y2="19" stroke="white" stroke-width="1.4"/>
      <line x1="5"  y1="19" x2="19" y2="19" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
    </svg>
  </div>

  <div class="nav-item active">
    <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    Chat
  </div>
  <div class="nav-item">
    <svg viewBox="0 0 24 24"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
    Memoria
  </div>
  <div class="nav-item">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
    Red
  </div>
  <div class="nav-item">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93l-1.41 1.41M5.34 17.66l-1.41 1.41M19.07 19.07l-1.41-1.41M5.34 6.34 3.93 4.93M21 12h-2M5 12H3M12 21v-2M12 5V3"/></svg>
    Ajustes
  </div>
  <div class="nav-spacer"></div>
  <div class="nav-item nav-exit">
    <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    Salir
  </div>
</div>

<!-- CENTER — VRM + Neural -->
<div class="center">
  <canvas id="nc"></canvas>
  <canvas id="vrmCanvas"></canvas>

  <div id="loadOverlay">
    <div class="load-ring"></div>
    <div class="load-txt">Cargando modelo...</div>
  </div>

  <div class="ctop">
    <div class="ctop-info">
      <h1>Kiora</h1>
      <div class="ctop-status">
        <div class="sdot"></div>
        <span id="stTxt">Sistema conectado</span>
      </div>
    </div>
  </div>

  <div class="hud">
    <div class="hud-lbl">Sistema</div>
    <div class="hud-row">
      <div class="hud-val" id="hudVal">Óptimo</div>
      <div class="wf">
        <span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span>
      </div>
    </div>
  </div>
</div>

<!-- CHAT PANEL -->
<div class="chat-panel">
  <div class="ch">
    <div class="ch-av">
      <svg viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="7" r="3" fill="white"/>
        <circle cx="6"  cy="19" r="2" fill="white"/>
        <circle cx="18" cy="19" r="2" fill="white"/>
        <line x1="12" y1="7" x2="6"  y2="19" stroke="white" stroke-width="1.3"/>
        <line x1="12" y1="7" x2="18" y2="19" stroke="white" stroke-width="1.3"/>
      </svg>
    </div>
    <div class="ch-info">
      <div class="ch-name">Kiora</div>
      <div class="ch-sub" id="chSub">● Sistema conectado</div>
    </div>
  </div>

  <div class="msgs" id="chat">
    <div class="msg bot">
      <div class="mav">
        <svg viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="7" r="3" fill="white"/>
          <circle cx="6"  cy="19" r="2" fill="white"/>
          <circle cx="18" cy="19" r="2" fill="white"/>
          <line x1="12" y1="7" x2="6"  y2="19" stroke="white" stroke-width="1.2"/>
          <line x1="12" y1="7" x2="18" y2="19" stroke="white" stroke-width="1.2"/>
        </svg>
      </div>
      <div class="mbody">
        <div class="mmeta">
          <span class="mname">Kiora</span>
          <span class="mtime" id="t0"></span>
        </div>
        <div class="mbbl">¡Hola! Estoy lista para ayudarte. ¿Qué deseas saber?</div>
      </div>
    </div>
  </div>

  <div class="iz">
    <input
      class="mi-input"
      id="msg"
      placeholder="Habla con Kiora..."
      autocomplete="off"
      enterkeyhint="send"
    >
    <button class="send-btn" onclick="send()">
      <svg viewBox="0 0 24 24">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>

<!-- Import map for Three.js modules -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/",
    "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@2.1.2/lib/three-vrm.module.js"
  }
}
</script>

<script type="module" src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
